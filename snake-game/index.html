<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇 Snake</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 2.5rem;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }
    .game-container {
      position: relative;
    }
    canvas {
      border: 3px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
    }
    .score {
      position: absolute;
      top: -40px;
      left: 0;
      font-size: 1.5rem;
      color: #00ff88;
    }
    .info {
      margin-top: 20px;
      text-align: center;
      color: #aaa;
    }
    .info kbd {
      background: #333;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-start {
      background: #00ff88;
      color: #1a1a2e;
      font-weight: bold;
    }
    .btn-start:hover {
      background: #00cc6a;
      transform: scale(1.05);
    }
    .btn-reset {
      background: #ff6b6b;
      color: #fff;
    }
    .btn-reset:hover {
      background: #ff5252;
    }
  </style>
</head>
<body>
  <h1>🐍 贪吃蛇</h1>
  <div class="game-container">
    <div class="score">分数: <span id="score">0</span></div>
    <canvas id="game" width="400" height="400"></canvas>
  </div>
  <div class="controls">
    <button class="btn-start" id="startBtn">开始游戏</button>
    <button class="btn-reset" id="resetBtn">重置</button>
  </div>
  <div class="info">
    <p>使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 控制方向</p>
    <p>手机端点击 canvas 区域控制方向</p>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    const GRID = 20;
    const TILE_COUNT = canvas.width / GRID;

    let snake = [];
    let food = { x: 15, y: 15 };
    let dx = 0;
    let dy = 0;
    let score = 0;
    let gameLoop = null;
    let isRunning = false;
    let lastDir = { x: 0, y: 0 };

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dx = 1;
      dy = 0;
      lastDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = score;
      placeFood();
      draw();
    }

    function placeFood() {
      food = {
        x: Math.floor(Math.random() * TILE_COUNT),
        y: Math.floor(Math.random() * TILE_COUNT)
      };
      // 确保食物不在蛇身上
      for (let s of snake) {
        if (s.x === food.x && s.y === food.y) {
          placeFood();
          break;
        }
      }
    }

    function draw() {
      // 清空画布
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 画网格
      ctx.strokeStyle = '#222';
      for (let i = 0; i < TILE_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID, 0);
        ctx.lineTo(i * GRID, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * GRID);
        ctx.lineTo(canvas.width, i * GRID);
        ctx.stroke();
      }

      // 画食物
      ctx.fillStyle = '#ff6b6b';
      ctx.shadowColor = '#ff6b6b';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // 画蛇
      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#00ff88' : '#00cc6a';
        if (i === 0) {
          ctx.shadowColor = '#00ff88';
          ctx.shadowBlur = 10;
        }
        ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
        ctx.shadowBlur = 0;
      });
    }

    function update() {
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // 撞墙
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        gameOver();
        return;
      }

      // 撞自己
      for (let s of snake) {
        if (head.x === s.x && head.y === s.y) {
          gameOver();
          return;
        }
      }

      snake.unshift(head);

      // 吃食物
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      lastDir = { x: dx, y: dy };
      draw();
    }

    function gameOver() {
      clearInterval(gameLoop);
      isRunning = false;
      startBtn.textContent = '重新开始';
      alert(`游戏结束！得分: ${score}`);
    }

    function startGame() {
      if (isRunning) return;
      init();
      isRunning = true;
      startBtn.textContent = '游戏中...';
      gameLoop = setInterval(update, 100);
    }

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      if (!isRunning && e.key !== ' ') return;
      
      switch(e.key) {
        case 'ArrowUp':
          if (lastDir.y !== 1) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
          if (lastDir.y !== -1) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
          if (lastDir.x !== 1) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
          if (lastDir.x !== -1) { dx = 1; dy = 0; }
          break;
      }
    });

    // 触摸控制
    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });

    canvas.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      
      const diffX = touchEndX - touchStartX;
      const diffY = touchEndY - touchStartY;
      
      if (Math.abs(diffX) > Math.abs(diffY)) {
        // 水平
        if (diffX > 0 && lastDir.x !== -1) { dx = 1; dy = 0; }
        else if (diffX < 0 && lastDir.x !== 1) { dx = -1; dy = 0; }
      } else {
        // 垂直
        if (diffY > 0 && lastDir.y !== -1) { dx = 0; dy = 1; }
        else if (diffY < 0 && lastDir.y !== 1) { dx = 0; dy = -1; }
      }
    });

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', () => {
      clearInterval(gameLoop);
      isRunning = false;
      startBtn.textContent = '开始游戏';
      init();
    });

    // 初始化
    init();
  </script>
</body>
</html>
